<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffb6cf">
    <meta name="description" content="CrazyChaos 的博客，文章元数据保存在 D1，正文保存在 R2，对外展示在 www.crazychaos.top。">
    <meta property="og:title" content="塔菲喵博客">
    <meta property="og:description" content="笔记、教程、更新记录和一点点粉色废话。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.crazychaos.top/blog/">
    <meta property="og:image" content="https://www.crazychaos.top/123/emoji_23.avif">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="塔菲喵博客">
    <title>塔菲喵博客</title>
    
    <link rel="icon" href="../123/emoji_23.avif" type="image/avif">
    <link rel="shortcut icon" href="../123/emoji_23.avif" type="image/avif">
    <link rel="apple-touch-icon" href="../123/emoji_23.avif">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="canonical" href="https://www.crazychaos.top/blog/">
    <script>
        (function() {
            
        // ==========================================
        // 主题模式切换 (Theme Mode Toggle)
        // ==========================================
        const themeToggleBtn = document.createElement('button');
        themeToggleBtn.className = 'theme-toggle-btn';
        themeToggleBtn.type = 'button';
        themeToggleBtn.setAttribute('aria-label', '切换主题');
        themeToggleBtn.innerHTML = '☀️'; // Default icon
        document.body.appendChild(themeToggleBtn);

        function updateThemeIcon(isDark) {
            themeToggleBtn.innerHTML = isDark ? '🌙' : '☀️';
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
                metaTheme.setAttribute('content', isDark ? '#180c20' : '#ffb6cf');
            }
        }

        function switchDark(nextIsDark) {
            if (nextIsDark) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                updateThemeIcon(true);
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                updateThemeIcon(false);
            }
        }

        // 初始化载入主题状态
        const initIsDark = document.documentElement.classList.contains('dark');
        updateThemeIcon(initIsDark);

        themeToggleBtn.addEventListener('click', (e) => {
            const nextIsDark = !document.documentElement.classList.contains('dark');
            
            if (!document.startViewTransition) {
                switchDark(nextIsDark);
                return;
            }

            const x = e.clientX || window.innerWidth / 2;
            const y = e.clientY || window.innerHeight / 2;

            const maxX = Math.max(x, window.innerWidth - x);
            const maxY = Math.max(y, window.innerHeight - y);
            const endRadius = Math.hypot(maxX, maxY);

            const root = document.documentElement;
            root.setAttribute('data-theme-to', nextIsDark ? 'dark' : 'light');
            root.style.setProperty('--vt-x', `${x}px`);
            root.style.setProperty('--vt-y', `${y}px`);
            root.style.setProperty('--vt-end-radius', `${endRadius + 10}px`);

            const transition = document.startViewTransition(() => {
                switchDark(nextIsDark);
            });

            transition.finished.finally(() => {
                root.removeAttribute('data-theme-to');
            });
        });


        // ==========================================
        // 0. 汉堡菜单逻辑
        // ==========================================
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        
        hamburgerBtn.addEventListener('click', function() {
            this.classList.toggle('active');
            sidebar.classList.toggle('open');
        });

        // 点击空白处关闭侧边栏
        document.addEventListener('click', (e) => {
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !hamburgerBtn.contains(e.target)) {
                sidebar.classList.remove('open');
                hamburgerBtn.classList.remove('active');
            }
        });

        // ==========================================
        // 1. 统一的身份验证与个人设置逻辑
        // ==========================================
        const API_BASE = 'https://mail.crazychaos.top/api';
        const MAIL_URL = 'https://mail.crazychaos.top';
        const mailNavLink = document.getElementById('mailNavLink');
        const loginBtn = document.getElementById('loginBtn');
        const quickLogoutBtn = document.getElementById('quickLogoutBtn');
        const userPill = document.getElementById('userPill');
        const userNickname = document.getElementById('userNickname');
        const userEmail = document.getElementById('userEmail');
        const loginModal = document.getElementById('loginModal');
        const profileModal = document.getElementById('profileModal');
        const loginForm = document.getElementById('loginForm');
        const profileForm = document.getElementById('profileForm');
        const loginMsg = document.getElementById('loginMsg');
        const loginStatus = document.getElementById('loginStatus');
        const profileMsg = document.getElementById('profileMsg');
        const nicknameInput = document.getElementById('nicknameInput');
        const DEFAULT_LOGIN_DOMAIN = '@crazychaos.top';

        if (mailNavLink) {
            mailNavLink.addEventListener('click', (event) => {
                event.preventDefault();
                sidebar.classList.remove('open');
                hamburgerBtn.classList.remove('active');
                window.location.assign(MAIL_URL);
            });
        }

        let currentUser = null;

        function openModal(modal) {
            modal.classList.add('open');
            requestAnimationFrame(() => {
                modal.classList.add('show');
            });
        }

        function closeModal(modal) {
            modal.classList.remove('show');
            setTimeout(() => {
                if (!modal.classList.contains('show')) {
                    modal.classList.remove('open');
                }
            }, 260);
        }

        function setLoginStatus(status) {
            loginStatus.className = 'auth-status-strip';
            if (status) {
                requestAnimationFrame(() => {
                    loginStatus.classList.add('active', status);
                });
            }
        }

        function getDisplayName(user) {
            if (!user) return '未登录';
            const fallback = user.email ? user.email.split('@')[0] : 'Taffy Fan';
            return user.nickname || user.name || fallback;
        }

        function setMessage(target, message, isError = false) {
            target.textContent = message;
            target.style.color = isError ? '#ffedf6' : '#fff';
        }

        function authHeaders(extra = {}) {
            const token = localStorage.getItem('token');
            return {
                ...(token ? { Authorization: token } : {}),
                ...extra
            };
        }

        function normalizeLoginEmail(email, domain = DEFAULT_LOGIN_DOMAIN) {
            const value = String(email || '').trim();
            if (!value) return '';
            return value.includes('@') ? value : `${value}${domain || DEFAULT_LOGIN_DOMAIN}`;
        }

        function renderUser(user) {
            currentUser = user;

            if (!user) {
                document.body.classList.remove('authenticated');
                loginBtn.style.display = 'block';
                quickLogoutBtn.classList.remove('show');
                userPill.classList.remove('show');
                if (detailPanel.classList.contains('open')) {
                    renderCommentForm();
                }
                return;
            }

            loginBtn.style.display = 'none';
            document.body.classList.add('authenticated');
            quickLogoutBtn.classList.add('show');
            userNickname.textContent = getDisplayName(user);
            userEmail.textContent = user.email || '';
            nicknameInput.value = user.nickname || '';
            userPill.classList.add('show');
            if (detailPanel.classList.contains('open')) {
                renderCommentForm();
            }
        }

        async function apiFetch(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                credentials: 'include',
                ...options,
                headers: {
                    ...authHeaders({
                        'Content-Type': 'application/json',
                        ...(options.headers || {})
                    })
                }
            });
            const data = await response.json().catch(() => ({ code: response.status, message: '请求失败' }));
            if (!response.ok || data.code !== 200) {
                throw new Error(data.message || '请求失败');
            }
            return data.data;
        }

        async function readApiJson(response, fallbackMessage = '请求失败') {
            const text = await response.text();
            const body = text.trim();
            const candidates = [body];
            if (body.startsWith('null')) {
                const rest = body.slice(4).trim();
                if (rest.startsWith('{') || rest.startsWith('[')) candidates.push(rest);
            }
            for (const candidate of candidates) {
                if (!candidate) return { code: response.status, message: fallbackMessage };
                try {
                    return JSON.parse(candidate);
                } catch {
                    // try next candidate
                }
            }
            return { code: response.status, message: fallbackMessage };
        }

        async function loadLoginUser() {
            try {
                const user = await apiFetch('/my/loginUserInfo', { method: 'GET' });
                renderUser(user);
            } catch (error) {
                renderUser(null);
            }
        }

        loginBtn.addEventListener('click', () => {
            setMessage(loginMsg, '');
            setLoginStatus('');
            openModal(loginModal);
        });

        userPill.addEventListener('click', () => {
            if (!currentUser) return;
            nicknameInput.value = currentUser.nickname || '';
            setMessage(profileMsg, '');
            openModal(profileModal);
        });

        document.getElementById('closeLoginBtn').addEventListener('click', () => closeModal(loginModal));
        document.getElementById('closeProfileBtn').addEventListener('click', () => closeModal(profileModal));
        document.getElementById('goMailBtn').addEventListener('click', () => {
            window.location.href = MAIL_URL;
        });

        loginModal.addEventListener('click', (event) => {
            if (event.target === loginModal) closeModal(loginModal);
        });

        profileModal.addEventListener('click', (event) => {
            if (event.target === profileModal) closeModal(profileModal);
        });

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage(loginMsg, '登录中...');
            setLoginStatus('loading');

            try {
                const form = new FormData(loginForm);
                const turnstileToken = form.get('cf-turnstile-response');
                if (!turnstileToken) {
                    throw new Error('请先完成人机验证');
                }
                const data = await apiFetch('/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: normalizeLoginEmail(form.get('email'), form.get('domain')),
                        password: form.get('password'),
                        token: turnstileToken
                    })
                });

                if (data?.token) {
                    localStorage.setItem('token', data.token);
                }

                await loadLoginUser();
                loginForm.reset();
                window.turnstile?.reset();
                setLoginStatus('success');
                setMessage(loginMsg, '登录成功');
                setTimeout(() => closeModal(loginModal), 720);
            } catch (error) {
                window.turnstile?.reset();
                setLoginStatus('error');
                setMessage(loginMsg, error.message || '登录失败', true);
            }
        });

        profileForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setMessage(profileMsg, '保存中...');

            try {
                const profile = await apiFetch('/my/profile', {
                    method: 'PUT',
                    body: JSON.stringify({ nickname: nicknameInput.value })
                });

                currentUser = {
                    ...currentUser,
                    nickname: profile.nickname
                };
                renderUser(currentUser);
                setMessage(profileMsg, '已保存');
            } catch (error) {
                setMessage(profileMsg, error.message || '保存失败', true);
            }
        });

        async function logoutCurrentUser(messageTarget = profileMsg) {
            setMessage(messageTarget, '退出中...');

            try {
                await apiFetch('/logout', { method: 'DELETE' });
            } catch (error) {
                console.warn(error);
            }

            localStorage.removeItem('token');
            renderUser(null);
            closeModal(profileModal);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => logoutCurrentUser(profileMsg));
        quickLogoutBtn.addEventListener('click', () => logoutCurrentUser(profileMsg));

        loadLoginUser();

        // ==========================================
        // 2. 博客读取、展示及交互逻辑
        // ==========================================
        const FALLBACK_COVER = '../123/emoji_1.webp';
        const articleList = document.getElementById('articleList');
        const tagCloud = document.getElementById('tagCloud');
        const detailPanel = document.getElementById('detailPanel');
        const detailTitle = document.getElementById('detailTitle');
        const detailMeta = document.getElementById('detailMeta');
        const detailBody = document.getElementById('detailBody');
        const commentList = document.getElementById('commentList');
        const commentLoginTip = document.getElementById('commentLoginTip');
        const commentForm = document.getElementById('commentForm');
        const commentContent = document.getElementById('commentContent');
        const commentMsg = document.getElementById('commentMsg');
        const backButton = document.getElementById('backButton');
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const loadMoreButton = document.getElementById('loadMoreButton');
        let posts = [];
        let currentTag = '';
        let currentQuery = '';
        let currentPage = 1;
        let totalPosts = 0;
        let isLoading = false;
        let activePostSlug = '';
        const PAGE_SIZE = 10;
        let initialPostSlug = new URLSearchParams(window.location.search).get('post') || '';

        function escapeHtml(value = '') {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function safeMarkdownUrl(url = '') {
            const value = String(url).trim();
            if (/^(https?:)?\/\//i.test(value) || value.startsWith('/') || value.startsWith('../') || value.startsWith('./')) {
                return value;
            }
            return '';
        }

        /* global marked */
        // Configure custom marked link / image renderers for safe markdown rendering
        const renderer = new marked.Renderer();
        renderer.link = function(href, title, text) {
            let h = href, t = title, tx = text;
            if (typeof href === 'object' && href !== null) {
                h = href.href;
                t = href.title;
                tx = href.text;
            }
            const safeUrl = safeMarkdownUrl(h);
            if (!safeUrl) return tx;
            const isExternal = /^https?:\/\//i.test(safeUrl);
            const target = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
            const titleAttr = t ? ` title="${escapeHtml(t)}"` : '';
            return `<a href="${safeUrl}"${target}${titleAttr}>${tx}</a>`;
        };
        renderer.image = function(href, title, text) {
            let h = href, t = title, tx = text;
            if (typeof href === 'object' && href !== null) {
                h = href.href;
                t = href.title;
                tx = href.text;
            }
            const safeUrl = safeMarkdownUrl(h);
            if (!safeUrl) return '';
            const titleAttr = t ? ` title="${escapeHtml(t)}"` : '';
            const altAttr = tx ? ` alt="${escapeHtml(tx)}"` : '';
            return `<img src="${safeUrl}"${altAttr}${titleAttr}>`;
        };
        marked.use({ renderer });

        function markdownToHtml(markdown = '') {
            try {
                return marked.parse(markdown);
            } catch (err) {
                console.error('marked parsing error', err);
                return escapeHtml(markdown);
            }
        }

        function normalizePost(post) {
            return {
                slug: post.slug,
                title: post.title || '未命名文章',
                summary: post.summary || '',
                category: post.category || '',
                tags: Array.isArray(post.tags) ? post.tags : [],
                coverUrl: post.coverUrl || FALLBACK_COVER,
                publishedAt: post.publishedAt || post.createdAt || '',
                viewCount: post.viewCount || 0,
                visibility: post.visibility || 'public',
                author: post.author || {},
                locked: Boolean(post.locked),
                commentCount: Number(post.commentCount || 0)
            };
        }

        function renderSkeleton(count = 3) {
            let html = '';
            for (let i = 0; i < count; i++) {
                html += `
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-cover"></div>
                        <div class="skeleton-info">
                            <div>
                                <div class="skeleton skeleton-title"></div>
                                <div class="skeleton skeleton-summary"></div>
                            </div>
                            <div class="skeleton-meta">
                                <div class="skeleton skeleton-meta-item"></div>
                                <div class="skeleton skeleton-meta-item"></div>
                                <div class="skeleton skeleton-meta-item"></div>
                            </div>
                        </div>
                    </div>
                `;
            }
            articleList.innerHTML = html;
            loadMoreButton.hidden = true;
        }

        function formatDate(value) {
            if (!value) return '未发布';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }

        function formatAuthor(post) {
            const email = post.author?.email || '';
            const nickname = post.author?.nickname || (email ? email.split('@')[0] : 'CrazyChaos');
            return email ? `${nickname} · ${email}` : nickname;
        }

        function setState(text) {
            articleList.innerHTML = `<div class="state">${escapeHtml(text)}</div>`;
            loadMoreButton.hidden = true;
        }

        function renderTags() {
            const tags = new Set();
            posts.forEach((post) => {
                if (post.category) tags.add(post.category);
                post.tags.forEach((tag) => tags.add(tag));
            });
            tagCloud.innerHTML = `<button class="tag-button ${currentTag ? '' : 'active'}" type="button" data-tag="">全部</button>`;
            [...tags].forEach((tag) => {
                const button = document.createElement('button');
                button.className = `tag-button ${tag === currentTag ? 'active' : ''}`;
                button.type = 'button';
                button.dataset.tag = tag;
                button.textContent = tag;
                tagCloud.appendChild(button);
            });
        }

        function updateLoadMore() {
            const hasMore = posts.length < totalPosts && !detailPanel.classList.contains('open');
            loadMoreButton.hidden = !hasMore;
            loadMoreButton.textContent = isLoading ? '读取中...' : '加载更多';
        }

        function renderPosts() {
            const filtered = currentTag
                ? posts.filter((post) => post.category === currentTag || post.tags.includes(currentTag))
                : posts;

            detailPanel.classList.remove('open');
            articleList.style.display = 'grid';

            if (!filtered.length) {
                setState(currentTag ? '这个分类暂时没有文章。' : '还没有发布文章。');
                return;
            }

            articleList.innerHTML = '';
            filtered.forEach((post) => {
                const button = document.createElement('button');
                button.className = 'post-card';
                button.type = 'button';
                button.innerHTML = `
                    <img class="post-cover" src="${escapeHtml(post.coverUrl)}" alt="">
                    <span>
                        <strong class="post-title">${escapeHtml(post.title)}</strong>
                        <p class="post-summary">${escapeHtml(post.summary || '点开看看这篇写了什么。')}</p>
                        <span class="post-meta">
                            <span>📅 ${escapeHtml(formatDate(post.publishedAt))}</span>
                            ${post.category ? `<span>📁 ${escapeHtml(post.category)}</span>` : ''}
                            <span>👤 ${escapeHtml(formatAuthor(post))}</span>
                            <span>👁️ ${post.viewCount} 阅读</span>
                            <span>💬 ${post.commentCount || 0} 评论</span>
                        </span>
                    </span>
                `;
                button.addEventListener('click', () => openPost(post.slug));
                articleList.appendChild(button);
            });
            updateLoadMore();
        }

        async function loadPosts(reset = true) {
            if (isLoading) return;
            isLoading = true;
            if (reset) {
                currentPage = 1;
                totalPosts = 0;
                posts = [];
                renderSkeleton(3);
            }
            updateLoadMore();
            try {
                const query = new URLSearchParams({ page: String(currentPage), pageSize: String(PAGE_SIZE) });
                if (currentQuery) query.set('q', currentQuery);
                if (currentTag) query.set('tag', currentTag);
                const response = await fetch(`${API_BASE}/blog/list?${query.toString()}`, {
                    credentials: 'include',
                    headers: authHeaders()
                });
                const json = await readApiJson(response);
                if (!response.ok || json.code !== 200) {
                    throw new Error(json.message || '读取失败');
                }
                const nextPosts = (json.data?.list || []).map(normalizePost);
                totalPosts = Number(json.data?.total || nextPosts.length);
                posts = reset ? nextPosts : posts.concat(nextPosts);
                currentPage += 1;
                renderTags();
                renderPosts();
                if (initialPostSlug) {
                    const slug = initialPostSlug;
                    initialPostSlug = '';
                    openPost(slug, false);
                }
            } catch (error) {
                console.warn(error);
                posts = [];
                renderTags();
                setState('博客 API 还没连上或暂无文章。');
            } finally {
                isLoading = false;
                updateLoadMore();
            }
        }

        async function openPost(slug, updateUrl = true) {
            if (updateUrl) {
                const url = new URL(window.location.href);
                url.searchParams.set('post', slug);
                history.pushState(null, '', url);
            }
            detailTitle.textContent = '';
            detailMeta.innerHTML = '';
            detailBody.innerHTML = `
                <div class="skeleton-detail">
                    <div class="skeleton skeleton-detail-title"></div>
                    <div class="skeleton skeleton-detail-meta"></div>
                    <div class="skeleton skeleton-detail-line"></div>
                    <div class="skeleton skeleton-detail-line"></div>
                    <div class="skeleton skeleton-detail-line"></div>
                    <div class="skeleton skeleton-detail-line short"></div>
                </div>
            `;
            commentList.innerHTML = '<div class="state">正在读取评论...</div>';
            commentMsg.textContent = '';
            activePostSlug = slug;
            articleList.style.display = 'none';
            loadMoreButton.hidden = true;
            detailPanel.classList.add('open');
            try {
                const response = await fetch(`${API_BASE}/blog/detail/${encodeURIComponent(slug)}`, {
                    credentials: 'include',
                    headers: authHeaders()
                });
                const json = await readApiJson(response);
                if (!response.ok || json.code !== 200) {
                    throw new Error(json.message || '读取失败');
                }
                const post = normalizePost(json.data);
                detailTitle.textContent = post.title;
                detailMeta.innerHTML = `
                    <span>📅 ${escapeHtml(formatDate(post.publishedAt))}</span>
                    ${post.category ? `<span>📁 ${escapeHtml(post.category)}</span>` : ''}
                    <span>👤 ${escapeHtml(formatAuthor(post))}</span>
                    <span>👁️ ${post.viewCount} 阅读</span>
                    <span>💬 ${post.commentCount || 0} 评论</span>
                    <button class="share-btn" type="button" id="sharePostBtn">🔗 分享</button>
                `;

                document.getElementById('sharePostBtn').addEventListener('click', () => {
                    const shareUrl = `${window.location.origin}${window.location.pathname}?post=${encodeURIComponent(slug)}`;
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        showToast('链接已复制到剪贴板，快分享给小伙伴吧！(◍•ᴗ•◍)');
                    }).catch((err) => {
                        console.error('Clipboard copy failed', err);
                        const input = document.createElement('input');
                        input.value = shareUrl;
                        document.body.appendChild(input);
                        input.select();
                        try {
                            document.execCommand('copy');
                            showToast('链接已复制到剪贴板，快分享给小伙伴吧！(◍•ᴗ•◍)');
                        } catch {
                            showToast('复制失败，请手动复制浏览器地址栏链接。', true);
                        }
                        input.remove();
                    });
                });
                let relatedToolsHtml = '';
                if (json.data.relatedTools && json.data.relatedTools.length > 0) {
                    relatedToolsHtml = `
                        <div class="related-tools-section" style="margin-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.25); padding-top: 24px;">
                            <h3 style="color: var(--pink); margin-bottom: 16px;">相关配套工具：</h3>
                            <div class="related-tools-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
                                ${json.data.relatedTools.map(tool => {
                                    const toolUrl = `/tools.html/${tool.slug}`;
                                    const cover = tool.coverUrl || '../123/emoji_1.webp';
                                    return `
                                        <a href="${toolUrl}" class="tool-recommend-card" style="display: flex; gap: 12px; padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.12); text-decoration: none; color: #fff; transition: all 0.25s ease;" onmouseover="this.style.background='rgba(255,255,255,0.22)'; this.style.transform='translateY(-2px)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'; this.style.transform='none'">
                                            <img src="${cover}" alt="" style="width: 70px; height: 70px; border-radius: 10px; object-fit: cover;">
                                            <div style="display: flex; flex-direction: column; justify-content: center; min-width: 0; text-align: left;">
                                                <div style="font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(tool.title)}</div>
                                                <div style="font-size: 0.8rem; color: var(--muted); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3;">${escapeHtml(tool.description)}</div>
                                            </div>
                                        </a>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
                detailBody.innerHTML = `<div>${markdownToHtml(json.data.content || post.summary || '这篇文章暂时没有正文。')}</div>${relatedToolsHtml}`;
                
                // Highlight code blocks
                detailBody.querySelectorAll('pre code').forEach((block) => {
                    if (typeof hljs.highlightElement === 'function') {
                        hljs.highlightElement(block);
                    } else if (typeof hljs.highlightBlock === 'function') {
                        hljs.highlightBlock(block);
                    }
                });
                renderCommentForm();
                loadComments(slug);
            } catch (error) {
                console.warn(error);
                detailTitle.textContent = '文章读取失败';
                detailBody.innerHTML = '<p>稍后再试，或者检查 Worker 的博客 API 是否已经部署。</p>';
                commentList.innerHTML = '';
            }
        }

        function renderCommentForm() {
            const loggedIn = Boolean(currentUser);
            commentLoginTip.hidden = loggedIn;
            commentForm.hidden = !loggedIn;
        }

        async function loadComments(slug) {
            try {
                const response = await fetch(`${API_BASE}/blog/comment/${encodeURIComponent(slug)}`, {
                    headers: authHeaders()
                });
                const json = await readApiJson(response);
                if (!response.ok || json.code !== 200) {
                    throw new Error(json.message || '评论读取失败');
                }
                const comments = json.data || [];
                if (!comments.length) {
                    commentList.innerHTML = '<div class="state">还没有评论。</div>';
                    return;
                }
                commentList.innerHTML = comments.map(comment => `
                    <article class="comment-item">
                        <div class="comment-head">
                            <span class="comment-author">${escapeHtml(comment.nickname || comment.email)}</span>
                            <span>${escapeHtml(formatDate(comment.createdAt))}</span>
                        </div>
                        <p>${escapeHtml(comment.content)}</p>
                    </article>
                `).join('');
            } catch (error) {
                console.warn(error);
                commentList.innerHTML = '<div class="state">评论暂时读取失败。</div>';
            }
        }

        tagCloud.addEventListener('click', (event) => {
            const button = event.target.closest('.tag-button');
            if (!button) return;
            currentTag = button.dataset.tag || '';
            tagCloud.querySelectorAll('.tag-button').forEach((item) => item.classList.toggle('active', item === button));
            loadPosts(true);
        });

        searchButton.addEventListener('click', () => {
            currentQuery = searchInput.value.trim();
            loadPosts(true);
        });

        searchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                currentQuery = searchInput.value.trim();
                loadPosts(true);
            }
        });

        loadMoreButton.addEventListener('click', () => {
            loadPosts(false);
        });

        commentForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const content = commentContent.value.trim();
            if (!activePostSlug || !content) {
                commentMsg.textContent = content ? '' : '请先填写评论';
                return;
            }
            commentMsg.textContent = '发表中...';
            try {
                const response = await fetch(`${API_BASE}/blog/comment/${encodeURIComponent(activePostSlug)}`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ content })
                });
                const json = await readApiJson(response);
                if (!response.ok || json.code !== 200) {
                    throw new Error(json.message || '发表失败');
                }
                commentContent.value = '';
                commentMsg.textContent = '已发表';
                await loadComments(activePostSlug);
            } catch (error) {
                commentMsg.textContent = error.message || '发表失败，请重新登录后再试';
            }
        });

        backButton.addEventListener('click', () => {
            const url = new URL(window.location.href);
            url.searchParams.delete('post');
            history.pushState(null, '', url.pathname + url.search);
            renderPosts();
        });

        window.addEventListener('popstate', () => {
            const slug = new URLSearchParams(window.location.search).get('post');
            if (slug) {
                openPost(slug, false);
            } else {
                renderPosts();
            }
        });

        loadPosts(true);
    </script>
</body>
</html>
