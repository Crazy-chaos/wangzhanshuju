        commentForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const content = commentContent.value.trim();
            if (!activePostSlug || !content) {
                commentMsg.textContent = content ? '' : '请先填写评论';
                return;
            }
            commentMsg.textContent = '发表中...';
            try {
                const response = await fetch(`${API_BASE}/blog/comment/${encodeURIComponent(activePostSlug)}`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ content })
                });
                const json = await readApiJson(response);
                if (!response.ok || json.code !== 200) {
                    throw new Error(json.message || '发表失败');

                commentContent.value = '';

                commentMsg.textContent = error.message || '发表失败，请重新登录后再试';
                showToast(error.message || '发表失败，请重新登录后再试', true);
            }
        });

        backButton.addEventListener('click', () => {

        window.addEventListener('popstate', () => {

            if (slug) {
                openPost(slug, false);
            } else {
                renderPosts();
            }
        });

        loadPosts(true);

        (function() {

            function loadProfileData() {

            function renderProfile() {

            // Events setup

            const editModal = document.getElementById('profileEditModal');
            const editForm = document.getElementById('profileEditForm');
            const closeEditBtn = document.getElementById('closeProfileEditBtn');
            const editLinksContainer = document.getElementById('editLinksContainer');

            let hoverTimeout = null;

            function showPopover() {
                clearTimeout(hoverTimeout);
                popover.classList.add('show');
            }

            function hidePopover() {
                clearTimeout(hoverTimeout);
                hoverTimeout = setTimeout(() => {
                    popover.classList.remove('show');
                }, 200); // 200ms smooth delay
            }

            // PC hover triggers
            container.addEventListener('mouseenter', () => {
                if (window.innerWidth > 768) {
                    showPopover();
                }
            });

            container.addEventListener('mouseleave', () => {
                if (window.innerWidth > 768) {
                    hidePopover();
                }
            });

            // Click toggle for PC & Mobile
            profileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = popover.classList.contains('show');
                if (isOpen) {
                    popover.classList.remove('show');
                } else {
                    showPopover();
                }
            });

            popover.addEventListener('click', (e) => {
                e.stopPropagation();
            });

            document.addEventListener('click', () => {
                popover.classList.remove('show');
            });

            // Edit trigger
            editTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                // Close popover
                popover.classList.remove('show');
                
                // Populate edit inputs
                const data = loadProfileData();
                document.getElementById('editProfileName').value = data.name || '';
                document.getElementById('editProfileBio').value = data.bio || '';
                document.getElementById('editProfileAvatar').value = data.avatar || '';
                
                // Render link inputs
                editLinksContainer.innerHTML = '';
                for (let i = 0; i < 5; i++) {
                    const link = (data.links && data.links[i]) || { name: '', url: '' };
                    const div = document.createElement('div');
                    div.className = 'edit-link-row';
                    div.innerHTML = `
                        <label>链接 ${i + 1}${i === 0 ? ' (默认B站)' : i === 1 ? ' (默认GitHub)' : ''}</label>
                        <input type="text" id="editLinkName_${i}" placeholder="显示名称 (如: Bilibili)" value="${link.name || ''}" style="margin-bottom:4px;">
                        <input type="url" id="editLinkUrl_${i}" placeholder="链接地址 (https://...)" value="${link.url || ''}">
                    `;
                    editLinksContainer.appendChild(div);
                }

                // Open modal
                editModal.classList.add('open');
                requestAnimationFrame(() => {
                    editModal.classList.add('show');
                });
            });

            function closeEditModal() {
                editModal.classList.remove('show');
                setTimeout(() => {
                    if (!editModal.classList.contains('show')) {
                        editModal.classList.remove('open');
                    }
                }, 260);
            }

            closeEditBtn.addEventListener('click', closeEditModal);
            
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) closeEditModal();
            });

            editForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('editProfileName').value.trim();
                const bio = document.getElementById('editProfileBio').value.trim();
                const avatar = document.getElementById('editProfileAvatar').value.trim();
                
                const links = [];
                for (let i = 0; i < 5; i++) {
                    const linkName = document.getElementById(`editLinkName_${i}`).value.trim();
                    const linkUrl = document.getElementById(`editLinkUrl_${i}`).value.trim();
                    links.push({ name: linkName, url: linkUrl });
                }

                const updatedData = { name, bio, avatar, links };
                localStorage.setItem('custom_profile_data', JSON.stringify(updatedData));
                
                renderProfile();
                closeEditModal();
            });

            // Initial render
            renderProfile();
        })();
        loadPosts(true);
    </script>
</body>
</html>
